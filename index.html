<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="/img/image.png" type="image/png">
<title>LearnFlow LMS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="mesh"></div>
<canvas id="network"></canvas>
<div class="cursor-glow"></div>

<nav class="navbar navbar-expand-lg fixed-top premium-nav">
<div class="container">

<a class="navbar-brand logo">
<i class="bi bi-mortarboard-fill"></i> LearnFlow
</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="nav">

<ul class="navbar-nav mx-auto">

<li class="nav-item">
<a class="nav-link nav-animated" href="#">
<i class="bi bi-journal-bookmark"></i>
<span>Courses</span>
</a>
</li>

<li class="nav-item">
<a class="nav-link nav-animated" href="#">
<i class="bi bi-people"></i>
<span>Instructors</span>
</a>
</li>

<li class="nav-item">
<a class="nav-link nav-animated" href="#">
<i class="bi bi-patch-check"></i>
<span>Certificates</span>
</a>
</li>

</ul>

<div class="d-flex gap-3">
<button class="btn btn-outline-light magnetic">Login</button>
<button class="btn btn-primary magnetic">Start Free Trial</button>
</div>

</div>
</div>
</nav>

<section class="hero container">

<div class="row align-items-center min-vh-100">

<div class="col-lg-6 reveal">

<span class="badge ai-badge mb-3">
<i class="bi bi-rocket-takeoff-fill"></i>
AI Powered LMS Platform
</span>

<h1 class="display-2 fw-bold hero-title">
Unlock Your <span class="gradient">Learning</span><br>
Potential
</h1>

<p class="lead text-light opacity-75">
AI powered courses, personalized learning paths and expert instructors.
</p>

<div class="mt-4 d-flex gap-3">

<button class="btn btn-lg btn-primary magnetic">
Start Learning
</button>

<button 
class="btn btn-lg btn-outline-light magnetic d-flex align-items-center gap-2"
data-bs-toggle="modal"
data-bs-target="#videoModal">

<i class="bi bi-play-circle-fill"></i>
Watch Demo

</button>
</div>
<div class="stats-section mt-5">

<div class="stat-box">
<i class="bi bi-people"></i>
<div>
<h3 class="counter" data-target="50000">0</h3>
<p>Active Learners</p>
</div>
</div>

<div class="stat-box">
<i class="bi bi-book"></i>
<div>
<h3 class="counter" data-target="1200">0</h3>
<p>Courses</p>
</div>
</div>

<div class="stat-box">
<i class="bi bi-award"></i>
<div>
<h3 class="counter" data-target="98">0</h3>
<p>Success Rate</p>
</div>
</div>

</div>

</div>

<div class="col-lg-6 text-center reveal">

<div class="hero-image-frame">

<img src="img/image copy.png"
class="hero-img">

<div class="floating-badge badge1">
<i class="bi bi-award-fill"></i> Certificate Earned
</div>

<div class="floating-badge badge2">
<i class="bi bi-book-fill"></i> New Course Added
</div>

</div>

</div>

</div>


</section>

<!-- VIDEO POPUP -->

<div class="modal fade video-modal" id="videoModal" tabindex="-1">
<div class="modal-dialog modal-dialog-centered modal-xl">
<div class="modal-content custom-modal">

<div class="modal-header border-0">
<h5 class="modal-title">
<i class="bi bi-play-circle-fill"></i> Demo Video
</h5>

<button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<div class="video-container">

<video id="demoVideo" controls>
<source src="Demovedio/demo.mp4" type="video/mp4">
</video>

</div>

</div>

</div>
</div>
</div>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
