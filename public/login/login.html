<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LearnFlow Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="login.css">

</head>
<body>

<!-- PARTICLE BACKGROUND -->
<div id="particles-js"></div>

<div class="container-fluid vh-100 position-relative">
  <div class="row h-100">

    <!-- LEFT SIDE LOGIN -->
    <div class="col-md-6 d-flex align-items-center justify-content-center">

      <div class="login-card glass">

        <h2 class="fw-bold mb-3 text-white">Welcome Back!</h2>
        <p class="text-light mb-4">
          Sign in to continue your learning journey
        </p>

        <!-- SOCIAL BUTTONS -->
        <div class="d-flex gap-3 mb-3">
          <button class="social-btn google-btn">
            <i class="bi bi-google"></i> Google
          </button>

          <button class="social-btn github-btn">
            <i class="bi bi-github"></i> GitHub
          </button>
        </div>

        <!-- DIVIDER -->
        <div class="divider">
          <span>OR CONTINUE WITH</span>
        </div>

        <input type="email" id="email" class="form-control mb-3 input-glow" placeholder="Email">
        <input type="password" id="password" class="form-control mb-3 input-glow" placeholder="Password">

        <button class="btn btn-primary w-100 login-btn" onclick="loginUser()">
          Login
        </button>

      
      <button class="btn btn-outline-light w-100 mt-3 signup-btn"
        onclick="window.location.href='signup.html'">
  Create New Account
</button>
</div>
    </div>
    

    <!-- RIGHT SIDE -->
    <div class="col-md-6 d-none d-md-flex align-items-center justify-content-center">
      <div class="text-center text-white px-4 floating">
        <h1 class="fw-bold display-5 gradient-text">
  Continue Your Learning Journey
</h1>
        <p class="mt-3">
          Access your enrolled courses, track progress, and earn certificates
        </p>
      </div>
    </div>

  </div>
</div>

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<!-- Particle JS -->
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script src="login.js"></script>

</body>
</html>
