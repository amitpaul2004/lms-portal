<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LearnFlow Sign Up</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="login.css">
</head>
<body>

<div id="particles-js"></div>

<div class="container-fluid vh-100 position-relative">
  <div class="row h-100">

    <!-- LEFT SIDE -->
    <div class="col-md-6 d-flex align-items-center justify-content-center">

      <div class="login-card glass">

        <h2 class="fw-bold mb-3 text-white">Create Account</h2>
        <p class="text-light mb-4">
          Join LearnFlow and start your journey
        </p>

        <input type="text" id="name" class="form-control mb-3 input-glow" placeholder="Full Name">

        <input type="email" id="email" class="form-control mb-3 input-glow" placeholder="Email">

        <input type="password" id="password" class="form-control mb-3 input-glow" placeholder="Password">

        <button class="btn btn-primary w-100 login-btn" onclick="registerUser()">
          Sign Up
        </button>

        <p class="mt-3 text-center text-light">
          Already have an account?
          <span class="register-link"
            onclick="window.location.href='login.html'">
            Login
          </span>
        </p>

      </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="col-md-6 d-none d-md-flex align-items-center justify-content-center">
      <div class="text-center text-white px-4 floating">
        <h1 class="fw-bold display-5">
          Start Learning Today
        </h1>
        <p class="mt-3">
          Unlock courses, earn certificates & grow your skills
        </p>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script src="login.js"></script>
</body>
</html>
